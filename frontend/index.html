<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Examen Final IA - CAG Lab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Modulo 3 · Examen Final</p>
        <h1>CAG Lab</h1>
        <p class="lead">Integra memoria contextual persistente en un asistente que ya recupera conocimiento del curso.</p>
      </section>

      <section class="workspace">
        <form id="ask-form" class="card ask-card">
          <label for="user-id">Usuario</label>
          <input id="user-id" name="user_id" value="demo_user" />

          <label for="question">Pregunta</label>
          <textarea id="question" name="question" rows="5" placeholder="Pregunta sobre RAG, CAG, SDD, BDD o TDD"></textarea>

          <button type="submit">Preguntar al asistente</button>
        </form>

        <aside class="card context-card">
          <p class="panel-label">Panel CAG</p>
          <h2>Mi Contexto Guardado</h2>

          <div id="context-list" class="context-list">
            <p class="context-empty">Sin contexto cargado.</p>
          </div>

          <form id="save-context-form" class="save-context-form">
            <label for="ctx-key">Clave</label>
            <input id="ctx-key" name="key" placeholder="ej: audience" autocomplete="off" />

            <label for="ctx-value">Valor</label>
            <input id="ctx-value" name="value" placeholder="ej: explicar como principiante" autocomplete="off" />

            <button type="submit" class="btn-secondary">Guardar Contexto</button>
          </form>
        </aside>
      </section>

      <section class="card response-card">
        <p class="panel-label">Respuesta</p>
        <div id="context-used-banner" class="context-used-banner hidden">
          <span class="badge-used">&#10003; Respuesta enriquecida con contexto CAG</span>
          <span id="context-used-keys" class="context-used-keys"></span>
        </div>
        <pre id="answer-output">Todavia no hiciste una pregunta.</pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
